<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ethical — لعبة الامبوستر</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;700;900&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#14101f; --bg2:#0e0b16; --surface:#1d1730; --surface2:#251d3d;
    --line:#332a4d; --violet:#8b5cf6; --violet-soft:#a78bfa; --magenta:#d946ef;
    --red:#f43f5e; --text:#ece8f5; --muted:#9a8fb8; --ok:#34d399;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{font-family:"IBM Plex Sans Arabic",system-ui,sans-serif;color:var(--text);min-height:100vh;overflow-x:hidden;
    background:radial-gradient(900px 600px at 80% -10%,rgba(139,92,246,.18),transparent 60%),
    radial-gradient(700px 500px at 0% 110%,rgba(217,70,239,.12),transparent 55%),var(--bg);}
  .particles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
  .particles span{position:absolute;width:5px;height:5px;border-radius:50%;background:radial-gradient(circle,var(--violet-soft),transparent 70%);opacity:.4;animation:drift linear infinite}
  @keyframes drift{from{transform:translateY(110vh) scale(.6)}to{transform:translateY(-10vh) scale(1.2)}}
  .wrap{position:relative;z-index:1;max-width:560px;margin:0 auto;padding:26px 18px 56px}
  .brand{display:flex;flex-direction:column;align-items:center;text-align:center;margin:16px 0 22px}
  .mark{font-family:"Space Grotesk";font-weight:700;letter-spacing:.18em;font-size:13px;color:var(--violet-soft);
    text-transform:lowercase;border:1px solid var(--line);padding:6px 14px;border-radius:999px;background:rgba(139,92,246,.06)}
  .mark::before{content:"// "}
  h1{font-family:"Cairo";font-weight:900;font-size:clamp(32px,10vw,48px);margin:13px 0 4px;line-height:1;
    background:linear-gradient(120deg,#fff,var(--violet-soft) 55%,var(--magenta));-webkit-background-clip:text;background-clip:text;color:transparent}
  .tag{color:var(--muted);font-size:14px;font-weight:500}
  .card{background:linear-gradient(180deg,var(--surface),var(--bg2));border:1px solid var(--line);border-radius:22px;padding:20px;margin-bottom:16px;box-shadow:0 18px 40px -24px rgba(0,0,0,.8)}
  .label{font-weight:700;font-size:15px;margin:0 0 12px;display:flex;align-items:center;gap:8px}
  .label .dot{width:7px;height:7px;border-radius:50%;background:var(--violet);box-shadow:0 0 10px var(--violet)}
  .name-input{display:flex;gap:9px}
  .name-input input{flex:1;background:var(--surface2);border:1px solid var(--line);border-radius:13px;padding:14px;color:var(--text);font-family:inherit;font-size:16px;outline:none}
  .name-input input:focus{border-color:var(--violet)}
  .add-btn{flex:none;width:52px;border-radius:13px;border:none;font-size:26px;font-weight:700;color:#fff;cursor:pointer;background:linear-gradient(120deg,var(--violet),var(--magenta))}
  .add-btn:active{transform:scale(.94)}
  .pills{display:flex;flex-wrap:wrap;gap:8px;margin-top:13px}
  .pill{display:flex;align-items:center;gap:7px;background:var(--surface2);border:1px solid var(--line);border-radius:11px;padding:8px 11px;font-size:14px;font-weight:600}
  .pill b{font-family:"Space Grotesk";color:var(--violet-soft);font-size:12px}
  .pill.imp{border-color:rgba(244,63,94,.5);color:#ffb3c0}
  .pill .x{cursor:pointer;color:var(--muted);font-weight:700;font-size:17px;line-height:1}
  .empty{color:var(--muted);font-size:13px;margin-top:11px}
  .chips{display:flex;flex-wrap:wrap;gap:9px}
  .chip{border:1px solid var(--line);background:var(--surface2);color:var(--muted);padding:10px 13px;border-radius:13px;font-size:14px;font-weight:600;cursor:pointer;transition:.15s;flex:1 1 auto;text-align:center}
  .chip:active{transform:scale(.96)}
  .chip.active{color:#fff;border-color:transparent;background:linear-gradient(120deg,var(--violet),var(--magenta));box-shadow:0 8px 22px -10px var(--violet)}
  .stepper{display:flex;align-items:center;justify-content:center;gap:16px}
  .step-btn{width:48px;height:48px;border-radius:14px;border:1px solid var(--line);background:var(--surface2);color:var(--text);font-size:24px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .step-btn:active{transform:scale(.92);border-color:var(--violet)}
  .count{font-family:"Space Grotesk";font-weight:700;font-size:38px;min-width:60px;text-align:center}
  .toggle{display:flex;align-items:center;justify-content:space-between;gap:12px;color:var(--muted);font-size:14px;font-weight:500}
  .switch{width:50px;height:29px;border-radius:999px;background:var(--surface2);border:1px solid var(--line);position:relative;cursor:pointer;transition:.2s;flex:none}
  .switch i{position:absolute;top:3px;right:3px;width:21px;height:21px;border-radius:50%;background:var(--muted);transition:.2s}
  .switch.on{background:linear-gradient(120deg,var(--violet),var(--magenta));border-color:transparent}
  .switch.on i{right:24px;background:#fff}
  .go{width:100%;border:none;border-radius:18px;padding:18px;font-family:"Cairo";font-weight:800;font-size:18px;color:#fff;cursor:pointer;background:linear-gradient(120deg,var(--violet),var(--magenta));box-shadow:0 16px 34px -14px var(--violet);transition:.15s}
  .go:active{transform:translateY(2px)}
  .go:disabled{opacity:.4;box-shadow:none}
  .go.sec{background:var(--surface2);border:1px solid var(--line);box-shadow:none;font-size:16px;padding:15px;color:var(--text)}
  .linkbox{background:var(--surface2);border:1px dashed var(--violet);border-radius:14px;padding:13px;font-size:12px;direction:ltr;text-align:left;word-break:break-all;color:var(--violet-soft);margin:12px 0;max-height:90px;overflow:auto}
  .hint{color:var(--muted);font-size:13px;line-height:1.7;margin-top:4px}
  .hint b{color:var(--violet-soft)}
  .now-word{text-align:center;padding:14px;border-radius:16px;background:rgba(139,92,246,.08);border:1px solid var(--line);margin-bottom:14px}
  .now-word .w{font-family:"Cairo";font-weight:900;font-size:26px;background:linear-gradient(120deg,#fff,var(--violet-soft));-webkit-background-clip:text;background-clip:text;color:transparent}
  .now-word .c{color:var(--muted);font-size:12px}
  .now-word .i{color:#ffb3c0;font-size:12px;margin-top:6px}
  .steps{counter-reset:s;list-style:none;padding:0;margin:0}
  .steps li{counter-increment:s;position:relative;padding:8px 34px 8px 0;color:var(--muted);font-size:13.5px;line-height:1.6}
  .steps li::before{content:counter(s);position:absolute;right:0;top:7px;width:22px;height:22px;border-radius:7px;background:rgba(139,92,246,.15);color:var(--violet-soft);font-family:"Space Grotesk";font-weight:700;font-size:12px;display:flex;align-items:center;justify-content:center}
  /* role view */
  .role-stage{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 22px;text-align:center}
  .pick-title{font-family:"Cairo";font-weight:800;font-size:24px;margin-bottom:6px}
  .pick-sub{color:var(--muted);font-size:14px;margin-bottom:24px}
  .names-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:11px;width:min(420px,90vw)}
  .name-btn{padding:18px 12px;border-radius:16px;border:1px solid var(--line);background:linear-gradient(180deg,var(--surface),var(--bg2));color:var(--text);font-family:inherit;font-weight:700;font-size:16px;cursor:pointer;transition:.15s}
  .name-btn:active{transform:scale(.96);border-color:var(--violet)}
  .seal{width:min(330px,82vw);aspect-ratio:1;border-radius:30px;cursor:pointer;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;border:1px solid var(--line);background:linear-gradient(180deg,var(--surface),var(--bg2));box-shadow:0 30px 60px -30px rgba(0,0,0,.9);overflow:hidden}
  .seal .glow{position:absolute;inset:-40%;background:radial-gradient(circle,rgba(139,92,246,.25),transparent 60%);animation:pulse 3.5s ease-in-out infinite}
  @keyframes pulse{0%,100%{transform:scale(.9);opacity:.6}50%{transform:scale(1.1);opacity:1}}
  .seal svg{width:80px;height:80px;position:relative;z-index:1}
  .seal .who{position:relative;z-index:1;color:var(--muted);font-size:13px}
  .seal .tap{position:relative;z-index:1;font-family:"Cairo";font-weight:700;font-size:18px;color:var(--violet-soft)}
  .seal .sub{position:relative;z-index:1;color:var(--muted);font-size:12px;margin-top:-6px}
  .revealed{animation:reveal .45s ease}
  @keyframes reveal{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}
  .cat-pill{font-size:13px;color:var(--muted);font-weight:600;background:var(--surface2);border:1px solid var(--line);padding:6px 14px;border-radius:999px;position:relative;z-index:1}
  .word{font-family:"Cairo";font-weight:900;font-size:clamp(26px,8vw,40px);position:relative;z-index:1;padding:0 10px;background:linear-gradient(120deg,#fff,var(--violet-soft));-webkit-background-clip:text;background-clip:text;color:transparent}
  .big-imp{font-family:"Cairo";font-weight:900;font-size:clamp(26px,8vw,40px);color:var(--red);text-shadow:0 0 30px rgba(244,63,94,.5);position:relative;z-index:1}
  .role-foot{color:var(--muted);font-size:13.5px;line-height:1.7;max-width:330px;margin-top:20px}
  .ctl{margin-top:16px;display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
  .ctl button{border:1px solid var(--line);background:var(--surface2);color:var(--text);padding:12px 18px;border-radius:13px;font-family:inherit;font-weight:700;font-size:14px;cursor:pointer}
  .ctl .upd{background:linear-gradient(120deg,var(--violet),var(--magenta));border:none;color:#fff}
  .imp .seal{border-color:rgba(244,63,94,.5)}
  .imp .seal .glow{background:radial-gradient(circle,rgba(244,63,94,.3),transparent 60%)}
  .flash{animation:flash 1s ease}
  @keyframes flash{0%{box-shadow:0 0 0 0 var(--violet)}50%{box-shadow:0 0 0 4px var(--violet)}100%{box-shadow:0 30px 60px -30px rgba(0,0,0,.9)}}
  .badlink{color:var(--muted);font-size:15px;line-height:1.8}
  .badlink a{color:var(--violet-soft)}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--line);color:var(--text);padding:12px 18px;border-radius:13px;font-size:14px;z-index:50;opacity:0;transition:.3s}
  .toast.show{opacity:1}
  .pin{width:100%;text-align:center;letter-spacing:.5em;font-family:"Space Grotesk";font-size:24px;background:var(--surface2);border:1px solid var(--line);border-radius:13px;padding:14px;color:var(--text);outline:none}
  .pin:focus{border-color:var(--violet)}
  .pinerr{color:#ffb3c0;font-size:13px;text-align:center;min-height:18px;margin:8px 0}
  @media (prefers-reduced-motion: reduce){.particles,.seal .glow{display:none}*{animation:none!important;transition:none!important}}
</style>
</head>

/* ============ obfuscation ============ */
const KEY="ethical-impostor-2026";
function xorStr(s){let o="";for(let i=0;i<s.length;i++)o+=String.fromCharCode(s.charCodeAt(i)^KEY.charCodeAt(i%KEY.length));return o;}
function enc(o){return btoa(unescape(encodeURIComponent(xorStr(JSON.stringify(o))))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');}
function dec(t){let b=t.replace(/-/g,'+').replace(/_/g,'/');while(b.length%4)b+='=';return JSON.parse(xorStr(decodeURIComponent(escape(atob(b)))));}

/* ============ realtime store (ntfy.sh, no signup) ============ */
function topic(code){return 'ethical-imp-'+code;}
async function pushTo(code,state){
  state.ts=Date.now();
  try{ await fetch('https://ntfy.sh/'+topic(code),{method:'POST',body:enc(state)}); }catch(e){ toast('تعذّر الاتصال بالإنترنت'); }
}
async function pullFrom(code){
  try{
    const r=await fetch('https://ntfy.sh/'+topic(code)+'/json?poll=1&since=12h');
    const txt=await r.text();
    let best=null,bestTs=-1;
    txt.trim().split('\n').filter(Boolean).forEach(ln=>{
      let o;try{o=JSON.parse(ln);}catch(e){return;}
      if(o.event!=='message'||!o.message)return;
      let s;try{s=dec(o.message);}catch(e){return;}
      if(s&&s.ts>bestTs){bestTs=s.ts;best=s;}
    });
    return best;
  }catch(e){return null;}
}

const $=id=>document.getElementById(id);
function rndInt(n){return Math.floor(Math.random()*n);}
function rndCode(){let s="";const a="abcdefghijkmnpqrstuvwxyz23456789";for(let i=0;i<6;i++)s+=a[rndInt(a.length)];return s;}
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=rndInt(i+1);[a[i],a[j]]=[a[j],a[i]];}return a;}
let toastT;function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2200);}
function shareLink(code){return location.href.split('#')[0]+'#room='+code;}

function esc(s){return (''+s).replace(/'/g,"\\'");}
function pinHash(pin,salt){let h=2166136261>>>0;const s=(salt||'')+':'+pin+':eth';for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619)>>>0;}return ('0000000'+h.toString(16)).slice(-8);}

function addName(){const inp=$('nameInput');const v=(inp.value||'').trim();if(!v)return;if(H.players.length>=16){toast('الحد ١٦ لاعب');return;}if(H.players.includes(v)){toast('الاسم مكرر');return;}H.players.push(v);renderHost();$('nameInput').focus();if(roomCode)pushSoon();}
function rmName(i){const n=H.players[i];H.players.splice(i,1);if(H.imps.includes(n)){H.imps=H.imps.filter(x=>x!==n);const pool=H.players.filter(p=>!H.imps.includes(p));if(H.imps.length<H.impCount&&pool.length){H.imps.push(pool[rndInt(pool.length)]);}}renderHost();if(roomCode)pushSoon();}
function setCat(k){H.catKey=k;renderHost();if(roomCode)pushSoon();}
function setImp(d){const maxImp=Math.max(1,H.players.length-1);H.impCount=Math.min(maxImp,Math.max(1,H.impCount+d));renderHost();if(roomCode)pushSoon();}
function pickRound(){const ck=H.catKey==='random'?CAT_KEYS[rndInt(CAT_KEYS.length)]:H.catKey;H.cat=CATS[ck].name;H.word=CATS[ck].words[rndInt(CATS[ck].words.length)];H.imps=shuffle(H.players).slice(0,Math.min(H.impCount,H.players.length-1||1));H.v=(H.v||0)+1;}
function createRoom(){if(H.players.length<3){toast('ضيف ٣ لاعبين');return;}roomCode=rndCode();pickRound();myRevealed=false;location.hash='host='+roomCode;pushTo(roomCode,H);renderHost();toast('تم إنشاء الغرفة ✅');}
function newRound(){if(H.players.length<3){toast('ضيف ٣ لاعبين');return;}pickRound();myRevealed=false;pushTo(roomCode,H);renderHost();toast('كلمة جديدة 🔄');}
async function resumeHost(code){roomCode=code;const s=await pullFrom(code);if(s){H=Object.assign(H,s);}renderHost();}
function cp(t){navigator.clipboard.writeText(t).then(()=>toast('تم نسخ الرابط ✓'));}
function cpMsg(code){const link=shareLink(code);const msg=`🎭 لعبة الامبوستر — ethical\nافتحوا الرابط واضغطوا على أسمائكم 👇\n${link}`;navigator.clipboard.writeText(msg).then(()=>toast('تم نسخ الرسالة ✓'));}

/* ============ PLAYER ============ */
const MASK=`<svg viewBox="0 0 100 100" fill="none"><path d="M50 18c18 0 34 6 38 10 0 22-10 44-38 44S12 50 12 28c4-4 20-10 38-10Z" stroke="#a78bfa" stroke-width="3"/><ellipse cx="34" cy="40" rx="9" ry="7" fill="#a78bfa"/><ellipse cx="66" cy="40" rx="9" ry="7" fill="#a78bfa"/><path d="M40 60c4 4 16 4 20 0" stroke="#a78bfa" stroke-width="3" stroke-linecap="round"/></svg>`;
let S=null, picked=null, revealed=false, verified=false, pinStage=null, lastV=-1, pollT=null, playerCode=null;

async function playerInit(code){
  playerCode=code;
  $('hostView').style.display='none';
  $('roleView').style.display='flex';
  $('roleView').innerHTML=`<div class="badlink">جارٍ التحميل…</div>`;
  await refresh(true);
  pollT=setInterval(()=>refresh(false),6000);
}
async function refresh(first){
  const s=await pullFrom(playerCode);
  if(!s){ if(first)$('roleView').innerHTML=`<div class="badlink">بانتظار الهوست… تأكد إنه أنشأ الغرفة.<br><br><button class="go" style="max-width:240px" onclick="refresh(true)">🔄 تحديث</button></div>`; return; }
  if(pinStage){ S=s; lastV=s.v; return; } // لا نقاطع كتابة الرمز
  const newRoundFlag = (s.v!==lastV);
  S=s; lastV=s.v;
  if(picked && !S.players.includes(picked)){ verified=false; renderRole(true); return; }
  if(picked && verified){ renderRole(false); if(newRoundFlag && revealed){flashSeal();toast('🔄 الكلمة تحدّثت');} }
  else renderPicker();
}
function renderPicker(){
  $('roleView').classList.remove('imp');
  $('roleView').innerHTML=`
    <div class="pick-title">اختر اسمك</div>
    <div class="pick-sub">اضغط على اسمك، وحط رمزك السري عشان تشوف كلمتك</div>
    <div class="names-grid">${S.players.map(n=>`<button class="name-btn" onclick="choose('${esc(n)}')">${n}${S.pins&&S.pins[n]?' 🔒':''}</button>`).join("")}</div>
    <div class="ctl"><button class="upd" onclick="refresh(false)">🔄 تحديث</button></div>`;
}
function choose(n){
  picked=n; revealed=false; verified=false; pinStage=null;
  const existing = S.pins && S.pins[n];
  if(existing){ pinStage='enter'; renderPinEnter(); }
  else { pinStage='set'; renderPinSet(); }
}
function renderPinSet(){
  $('roleView').classList.remove('imp');
  $('roleView').innerHTML=`
    <div class="pick-title">رمزك السري</div>
    <div class="pick-sub">يا ${picked}، حط رمز ٤ أرقام تتذكره — يمنع أي أحد يفتح اسمك.</div>
    <div style="width:min(320px,90vw)">
      <input class="pin" id="p1" type="tel" inputmode="numeric" maxlength="4" placeholder="٤ أرقام">
      <div class="pinerr" id="perr"></div>
      <button class="go" onclick="submitSetPin()">حفظ الرمز</button>
    </div>
    <div class="ctl"><button onclick="picked=null;pinStage=null;renderPicker()">↩︎ رجوع</button></div>`;
}
function renderPinEnter(){
  $('roleView').classList.remove('imp');
  $('roleView').innerHTML=`
    <div class="pick-title">رمز ${picked} 🔒</div>
    <div class="pick-sub">اكتب رمزك السري عشان تشوف دورك.</div>
    <div style="width:min(320px,90vw)">
      <input class="pin" id="p1" type="tel" inputmode="numeric" maxlength="4" placeholder="٤ أرقام">
      <div class="pinerr" id="perr"></div>
      <button class="go" onclick="submitEnterPin()">دخول</button>
    </div>
    <div class="pick-sub" style="margin-top:14px;font-size:12px">نسيت رمزك؟ خلّ الهوست يضغط 🔓 جنب اسمك.</div>
    <div class="ctl"><button onclick="picked=null;pinStage=null;renderPicker()">↩︎ رجوع</button></div>`;
}
async function submitSetPin(){
  const a=($('p1').value||'').trim(), e=$('perr');
  if(!/^\d{4}$/.test(a)){e.textContent='لازم ٤ أرقام';return;}
  const h=pinHash(a,playerCode);
  const latest=(await pullFrom(playerCode))||S; latest.pins=latest.pins||{};
  if(latest.pins[picked] && latest.pins[picked]!==h){ S=latest; pinStage='enter'; renderPinEnter(); $('perr').textContent='الاسم له رمز محطوط مسبقاً — اكتبه'; return; }
  latest.pins[picked]=h; await pushTo(playerCode,latest); S=latest;
  const nm=picked; picked=null; pinStage=null; verified=false; renderPicker();
  toast('تم حفظ رمز '+nm+' — اختر اسمك وادخل بالرمز');
}
function submitEnterPin(){
  const a=($('p1').value||'').trim(), e=$('perr');
  if(!/^\d{4}$/.test(a)){e.textContent='لازم ٤ أرقام';return;}
  const h=pinHash(a,playerCode);
  if(S.pins && S.pins[picked]===h){ verified=true; pinStage=null; revealed=false; renderRole(false); }
  else e.textContent='الرمز غير صحيح';
}
function renderRole(removed){
  const stage=$('roleView');
  if(removed){
    stage.classList.remove('imp');
    stage.innerHTML=`<div class="pick-title">يا ${picked} 👋</div>
      <div class="pick-sub">الهوست شالك من اللعبة أو غيّر الأسماء.</div>
      <div class="ctl"><button class="upd" onclick="refresh(false)">🔄 تحديث</button>
      <button onclick="picked=null;verified=false;renderPicker()">↩︎ اختر اسم</button></div>`;
    return;
  }
  const imp=S.imps.includes(picked);
  stage.classList.toggle('imp',imp);
  if(!revealed){
    stage.innerHTML=`
      <div class="seal" id="seal" onclick="flip()"><div class="glow"></div>${MASK}
        <div class="who">أهلاً ${picked}</div>
        <div class="tap">اضغط لكشف دورك</div>
        <div class="sub">تأكد ما أحد يطالع شاشتك 👀</div></div>
      <div class="role-foot" id="foot"></div>
      <div class="ctl"><button class="upd" onclick="refresh(false)">🔄 تحديث</button>
      <button onclick="picked=null;verified=false;renderPicker()">↩︎ مب أنا</button></div>`;
  }else{ drawReveal(); }
}
function flip(){revealed=true;drawReveal();}
function drawReveal(){
  const imp=S.imps.includes(picked);
  const html = imp
    ? `<div class="glow"></div><div class="big-imp">أنت الامبوستر</div>${S.tellCat?`<div class="cat-pill">التصنيف: ${S.cat}</div>`:''}<div class="tap" style="color:var(--red)">🤫 طنّش وخلّك معاهم</div>`
    : `<div class="glow"></div><div class="cat-pill">${S.cat}</div><div class="word">${S.word}</div><div class="tap" style="font-size:14px">هذي كلمتك السرية</div>`;
  $('roleView').innerHTML=`<div class="seal revealed" id="seal">${html}</div>
    <div class="role-foot">${imp?'ما عندك الكلمة. اسمع تلميحاتهم وجاوب بشكل يخليهم ما يشكّون فيك.':'احفظ الكلمة ولا تقولها صريحة. لمّحوا لها بالدور.'}</div>
    <div class="ctl"><button class="upd" onclick="refresh(false)">🔄 تحديث</button>
    <button onclick="picked=null;verified=false;revealed=false;renderPicker()">↩︎ مب أنا</button></div>`;
  $('roleView').classList.toggle('imp',imp);
}
function flashSeal(){const s=$('seal');if(s){s.classList.remove('flash');void s.offsetWidth;s.classList.add('flash');}}

/* ============ particles + routing ============ */
(function(){const p=$('particles');for(let i=0;i<14;i++){const s=document.createElement('span');s.style.left=Math.random()*100+'%';s.style.animationDuration=(8+Math.random()*10)+'s';s.style.animationDelay=(-Math.random()*12)+'s';s.style.opacity=(.15+Math.random()*.35);p.appendChild(s);}})();

const hRoom=location.hash.match(/room=([a-z0-9]+)/i);
const hHost=location.hash.match(/host=([a-z0-9]+)/i);
if(hRoom){ playerInit(hRoom[1]); }
else if(hHost){ resumeHost(hHost[1]); }
else { renderHost(); }
</script>
</body>
</html>
